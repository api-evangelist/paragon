          schema:
            type: string
        - name: apiPath
          in: path
          required: true
          description: >-
            The API path of the third-party provider to send the request to.
          schema:
            type: string
      requestBody:
        description: The request body to send to the third-party provider API.
        content:
          application/json:
            schema:
