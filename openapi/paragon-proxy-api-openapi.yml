components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Paragon User Token. Authenticate with a signed JWT token for the
        Connected User.
tags:
  - name: Proxy
    description: Proxy requests to third-party integration APIs.
  - name: Custom Integrations
    description: Proxy requests to custom integration APIs.
