specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Paragon
providerId: paragon
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Embedded Integrations
description: Paragon API rate limits per workspace.
sources:
  - https://www.useparagon.com/pricing
  - https://docs.useparagon.com/api/rate-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Connect API
    scope: workspace
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Workflow executions
    scope: workspace
    metric: concurrent
    limit: tier-based
  - name: ActionKit API
    scope: workspace
    metric: requests_per_second
    limit: 50
    timeFrame: second
